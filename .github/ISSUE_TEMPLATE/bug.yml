name: Bug
description: File a bug report.
title: "[Bug] "
labels: Bug
body:
  - type: input
    id: contact
    attributes:
      label: Reported by
      description: Who has reported this bug?
    validations:
      required: true
  - type: textarea
    id: bugdetails
    attributes:
      label: Details of bug
      description: Also tell us, what did you expect to happen?
    validations:
      required: true
  - type: dropdown
    id: release
    attributes:
      label: Release
      description: What release of our software did this happen in?
      options:
        - POC
        - MVP
        - Prod 1
      default: 0
    validations:
      required: true
  - type: dropdown
    id: browsers
    attributes:
      label: What browsers are you seeing the problem on?
      multiple: true
      options:
        - Firefox
        - Chrome
        - Safari
        - Microsoft Edge
  - type: textarea
    id: otherdetails
    attributes:
      label: Other details
      description: Enter any other supporting information
      render: shell
